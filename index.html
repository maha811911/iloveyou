<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Love Heart</title>
<style>
    body {
        margin: 0;
        background: black;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    canvas {
        display: block;
    }
</style>
</head>
<body>

<canvas id="heart"></canvas>

<script>
const canvas = document.getElementById("heart");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let t = 0;

function heartFunction(t) {
    let x = 16 * Math.pow(Math.sin(t), 3);
    let y = 13 * Math.cos(t) - 5 * Math.cos(2*t)
          - 2 * Math.cos(3*t) - Math.cos(4*t);
    return {x, y};
}

let points = [];

for (let i = 0; i < Math.PI * 2; i += 0.1) {
    let p = heartFunction(i);
    points.push(p);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    let scale = 15;
    let centerX = canvas.width / 2;
    let centerY = canvas.height / 2;

    let angle = t * 0.05; // سرعة الدوران (متوسطة)

    ctx.font = "14px Arial";
    ctx.fillStyle = "red";
    ctx.shadowColor = "red";
    ctx.shadowBlur = 10;

    points.forEach((p, i) => {
        let x = p.x * scale;
        let y = -p.y * scale;

        // دوران
        let rotatedX = x * Math.cos(angle) - y * Math.sin(angle);
        let rotatedY = x * Math.sin(angle) + y * Math.cos(angle);

        ctx.fillText("I love you", centerX + rotatedX, centerY + rotatedY);
    });

    t++;
    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
