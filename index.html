<!DOCTYPE html>
<html>
<head>
    <title>Perfect Heart</title>
    <style>
        body {
            margin: 0;
            background-color: black;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
    </style>
</head>
<body>
    <canvas id="heart"></canvas>
    <script>
        const canvas = document.getElementById('heart');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const words = "I love you";
        const scale = 13; // حجم القلب
        let t = 0;

        function draw() {
            // مسح تدريجي خفيف جداً عشان يسوي تأثير "الخيوط" اللي بالصورة
            ctx.fillStyle = 'rgba(0, 0, 0, 0.03)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // إعداد الخط: خليته Bold وصغير عشان الكلمة تبان كاملة ومرتبة
            ctx.font = "bold 14px monospace"; 
            ctx.fillStyle = "#ff0000";

            // رسم 5 كلمات في كل مرة عشان السرعة تكون ممتازة
            for(let i = 0; i < 5; i++) {
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
                
                const posX = x * scale + canvas.width / 2;
                const posY = y * scale + canvas.height / 2;

                // رسم الكلمة
                ctx.save();
                ctx.translate(posX, posY);
                // تدوير الكلمة عشان تمشي مع انحناء القلب (زي الصورة بالضبط)
                ctx.rotate(t + Math.PI / 2); 
                ctx.fillText(words, 0, 0);
                ctx.restore();

                t += 0.015; // هذي السرعة.. موزونة عشان تطلع مرتبة
            }

            requestAnimationFrame(draw);
        }

        draw();

        window.onresize = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        };
    </script>
</body>
</html>
